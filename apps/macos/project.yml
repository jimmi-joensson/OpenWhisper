name: OpenWhisper
options:
  bundleIdPrefix: com.openwhisper
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  generateEmptyDirectories: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.12.4"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: "YES"
    DEAD_CODE_STRIPPING: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    ONLY_ACTIVE_ARCH: "YES"
    ALWAYS_SEARCH_USER_PATHS: "NO"
    CLANG_ENABLE_MODULES: "YES"
    CLANG_ENABLE_OBJC_ARC: "YES"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  OpenWhisper:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: App
      - path: Generated
        optional: true
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icon
      - path: Resources/AppIconDev.icon
      - path: Resources/samples
    dependencies:
      - package: FluidAudio
    info:
      path: Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "OpenWhisper needs microphone access to transcribe your speech on-device."
        NSAppleEventsUsageDescription: "OpenWhisper needs accessibility access to paste transcribed text into the app you're working in."
        NSHumanReadableCopyright: "Copyright © 2026 Jimmi Joensson. Licensed under MIT."
        LSMinimumSystemVersion: "15.0"
        # Intentionally NOT LSUIElement. We run as a regular app at the
        # Launch Services level (so the system registers us in the Force
        # Quit dialog and Activity Monitor lists us as a proper app),
        # then flip to .accessory at runtime in applicationWillFinishLaunching
        # to suppress the Dock icon. This is the pattern Superwhisper uses.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: "$(PRODUCT_NAME)"
    entitlements:
      path: Resources/OpenWhisper.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: App/OpenWhisper-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Generated
          - $(SRCROOT)/Generated/openwhisper_core
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        OTHER_LDFLAGS:
          - -lopenwhisper_core
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.openwhisper.OpenWhisper.dev
          PRODUCT_NAME: "OpenWhisper Dev"
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.openwhisper.OpenWhisper
          PRODUCT_NAME: "OpenWhisper"
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
