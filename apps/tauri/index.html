<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
    <script>
      // FOUC guard for ThemeProvider (src/lib/use-theme.tsx). Reads the
      // persisted choice and applies the dark/light class on <html> before
      // React mounts, so the page never paints in the wrong theme on boot.
      (function () {
        try {
          var stored = localStorage.getItem("openwhisper-theme");
          var theme =
            stored === "light" || stored === "dark" || stored === "system"
              ? stored
              : "system";
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var effective =
            theme === "system" ? (prefersDark ? "dark" : "light") : theme;
          document.documentElement.classList.add(effective);
        } catch (_) {
          /* localStorage unavailable — fall through to default light. */
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
