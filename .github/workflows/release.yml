name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (without leading 'v')"
        required: true
        default: "0.0.0-manual"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    # macos-15 = Sequoia arm64; needed for Xcode 26 (`.icon` format and the
    # xcodegen-generated project file format 77).
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install Rust (stable, arm64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Select newest Xcode
        run: |
          ls /Applications/ | grep -E '^Xcode' || true
          NEWEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -z "$NEWEST" ]]; then NEWEST=/Applications/Xcode.app; fi
          echo "Selecting: $NEWEST"
          sudo xcode-select -s "$NEWEST"
          xcodebuild -version

      - name: Package DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: scripts/package-release.sh

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWhisper-${{ steps.version.outputs.version }}-arm64
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: true
          generate_release_notes: true
          name: OpenWhisper ${{ steps.version.outputs.version }}
          body: |
            **macOS (Apple Silicon / arm64)** build of OpenWhisper ${{ steps.version.outputs.version }}.

            ## Install

            1. Download `OpenWhisper-${{ steps.version.outputs.version }}-arm64.dmg` below.
            2. Open the DMG and drag **OpenWhisper** to `/Applications`.
            3. First launch requires Gatekeeper bypass — see [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md) for the walkthrough and permission grants (Mic / Accessibility / Input Monitoring).
            4. On first run, OpenWhisper downloads the Parakeet v3 CoreML weights (~hundreds MB). This happens once.

            This build is **ad-hoc signed, not notarized**. macOS will warn on first launch — expected.
